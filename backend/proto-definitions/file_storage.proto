syntax = "proto3";

package file_storage;

option java_multiple_files = true;
option java_outer_classname = "FileStorageProto";
option java_package = "io.grpc.file_storage";

// The File Store service definition.
service FileStorageService {
  // Stores a file in S3
  rpc StoreFile(StoreFileRequest) returns (StoreFileResponse) {}
  // Gets a presigned URL from S3
  rpc GetPresignedUrl(GetPresignedUrlRequest) returns (GetPresignedUrlResponse) {}
  // Deletes an object from S3
  rpc DeleteObject(DeleteObjectRequest) returns (DeleteObjectResponse) {}
}

// Request to store a file.
message StoreFileRequest {
  string file_path = 1;
  string bucket_name = 2;
  string key = 3;
}

// Response for store file operation
message StoreFileResponse {}

// Request to get the pre-signed URL for a stored file.
message GetPresignedUrlRequest {
  string bucket_name = 1;
  string key = 2;
}

// Presigned URL response
message GetPresignedUrlResponse {
  string presigned_url = 1;
}

// Delete object request
message DeleteObjectRequest {
  string bucket_name = 1;
  string key = 2;
}

// Response for delete operation
message DeleteObjectResponse {}
